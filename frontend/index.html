<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirPnP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="overlay">
      <h1>Trouvez votre prochain hébergement</h1>
      <p>Des logements uniques, dans les plus belles villes.</p>

      <form class="search-bar" id="searchForm" autocomplete="off">
        <div class="search-field autocomplete-container">
          <label for="cityInput">Destination</label>
          <input
            type="text"
            id="cityInput"
            placeholder="Rechercher une ville"
          />
          <div id="suggestions" class="suggestions"></div>
        </div>

        <div class="search-field">
          <label for="travelers">Voyageurs</label>
          <input type="number" id="travelers" min="1" placeholder="Ex : 2" />
        </div>

        <button type="submit">Rechercher</button>
      </form>
    </div>
  </header>

  <main class="main-content">
    <section class="intro">
      <h2>Hébergements disponibles</h2>
    </section>

    <section id="listings" class="listings"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
